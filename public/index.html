<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>GearCall — Book a Mechanic</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>

<body>

  <div class="topbar">
    <div class="brand">
      <div class="brand-mark"></div>
      <div class="brand-name">Gear<span>Call</span></div>
    </div>
    <div class="who-am-i hidden" id="whoami">
      <div><span class="tag" id="who-role"></span><br><span class="name" id="who-name"></span></div>
      <button class="logout-btn" onclick="logout()">Log out</button>
    </div>
  </div>

  <!-- ================= AUTH SCREEN ================= -->
  <div class="auth-wrap" id="auth-screen">
    <div class="auth-card">
      <div class="auth-tabs">
        <button id="tab-login" class="active" onclick="setAuthTab('login')">Log in</button>
        <button id="tab-signup" onclick="setAuthTab('signup')">Sign up</button>
      </div>

      <div id="auth-error" class="auth-error"></div>

      <!-- LOGIN -->
      <div id="login-form">
        <h2>Welcome back</h2>
        <p class="sub">Log in to book a mechanic, manage jobs, or run the platform.</p>
        <div class="field"><label>Email</label><input id="login-email" type="email" placeholder="you@example.com"></div>
        <div class="field"><label>Password</label><input id="login-password" type="password" placeholder="••••••••">
        </div>

        <!-- Naya: Forgot Password -->
        <div style="text-align: right; margin-top: -15px; margin-bottom: 20px;">
          <a href="#" style="color: var(--paper-dim); font-size: 12px; text-decoration: none;">Forgot password?</a>
        </div>

        <button class="btn" onclick="doLogin()">Log in</button>

        <!-- Naya: Google Login -->
        <div
          style="text-align: center; margin: 20px 0; color: var(--paper-dim); font-size: 12px; border-top: 1px solid var(--line); padding-top: 15px;">
          OR</div>
        <button
          style="background: transparent; border: 1px solid var(--line); color: var(--paper); width: 100%; padding: 12px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;">
          <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="16"
            alt="Google">
          Continue with Google
        </button>
      </div>

      <!-- SIGNUP -->
      <div id="signup-form" class="hidden">
        <h2>Create an account</h2>
        <p class="sub">Sign up as a customer to book jobs, or as a mechanic to accept them.</p>
        <div class="field">
          <label>I am a...</label>
          <div class="role-pick">
            <button type="button" class="sel" id="role-customer" onclick="setSignupRole('customer')">Customer</button>
            <button type="button" id="role-mechanic" onclick="setSignupRole('mechanic')">Mechanic</button>
          </div>
        </div>
        <div class="field" id="signup-spec-field" style="display:none;">
          <label>I work on...</label>
          <div class="veh-toggle">
            <button type="button" class="sel" id="spec-car" onclick="setSignupSpec('car')">🚗 Car</button>
            <button type="button" id="spec-bike" onclick="setSignupSpec('bike')">🏍️ Bike</button>
            <button type="button" id="spec-both" onclick="setSignupSpec('both')">Both</button>
          </div>
        </div>
        <div class="field"><label>Full name</label><input id="signup-name" type="text" placeholder="Your name"></div>
        <div class="field"><label>Email</label><input id="signup-email" type="email" placeholder="you@example.com">
        </div>
        <div class="field"><label>Password</label><input id="signup-password" type="password"
            placeholder="At least 6 characters"></div>
        <button class="btn" onclick="doSignup()">Create account</button>
      </div>
    </div>
  </div>

  <main class="hidden" id="app-main">
    <!-- ... baki ka code waisa hi rahega ... -->
  </main>

  <footer>GEARCALL — DATA IS REAL AND PERSISTED IN A LOCAL SQLITE DATABASE (data/gearcall.db)</footer>
  <div class="toast" id="toast"></div>

  <script src="/app.js"></script>
</body>

</html>
